<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Circle Void — 원을 그려 구멍을 열어라</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap">
<style>
  :root {
    --cv-bg: #F2EBD9;
    --cv-ink: #1A1209;
    --cv-ink-mid: #3D2B1A;
    --cv-ink-light: #7A5C3F;
    --cv-grade-s: #C9922B;
    --cv-grade-a: #8B1A1A;
    --cv-grade-b: #3D2B1A;
    --cv-grade-c: #7A5C3F;
    --cv-grade-d: #A89070;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cv-bg);
    overflow: hidden;
    font-family: 'Noto Serif KR', serif;
    color: var(--cv-ink);
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    display: block; position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
  }
  #paper-canvas { z-index: 0; pointer-events: none; }
  #ink-canvas { z-index: 1; }

  #ui-layer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  .top-bar { display: flex; justify-content: space-between; padding: 20px 30px; }
  .best-score {
    display: flex; align-items: center; gap: 8px;
    background: rgba(26,18,9,0.05); border: 1px solid rgba(26,18,9,0.10);
    border-radius: 12px; padding: 8px 16px; font-size: 13px; color: var(--cv-ink-mid);
  }
  .best-score span { font-weight: 700; color: var(--cv-ink); }
  .hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 18px; color: rgba(26,18,9,0.25); letter-spacing: 0.08em;
    transition: opacity 0.5s; pointer-events: none;
  }
  #result-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 20;
  }
  #result-overlay.show { opacity: 1; pointer-events: auto; }
  .result-card {
    background: rgba(242,235,217,0.95); backdrop-filter: blur(16px);
    border: 1px solid rgba(26,18,9,0.10); border-radius: 20px;
    padding: 40px 48px; text-align: center;
    box-shadow: 0 8px 32px rgba(26,18,9,0.08);
  }
  .grade { font-size: 72px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
  .score-label { font-size: 13px; color: var(--cv-ink-light); margin-bottom: 4px; letter-spacing: 0.1em; }
  .score-value { font-size: 32px; font-weight: 700; margin-bottom: 20px; }
  .new-best { display: none; font-size: 13px; color: var(--cv-grade-s); margin-bottom: 16px; }
  .new-best.show { display: block; }
  .retry-btn {
    background: var(--cv-ink); color: var(--cv-bg); border: none;
    border-radius: 10px; padding: 12px 36px; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer; pointer-events: auto;
  }
  .retry-btn:hover { opacity: 0.8; }
</style>
</head>
<body>

<canvas id="paper-canvas"></canvas>
<canvas id="ink-canvas"></canvas>

<div id="ui-layer">
  <div class="top-bar">
    <div class="best-score">최고 <span id="best-score-value">—</span></div>
  </div>
  <div class="hint" id="hint">붓을 들어 원을 그리세요</div>
</div>

<div id="result-overlay">
  <div class="result-card">
    <div class="grade" id="grade">S</div>
    <div class="score-label">정확도</div>
    <div class="score-value"><span id="score-value">0</span>%</div>
    <div class="new-best" id="new-best">새로운 기록!</div>
    <button class="retry-btn" id="retry-btn">다시 그리기</button>
  </div>
</div>

<script>
// ============================================================
// Setup
// ============================================================
const paperCanvas = document.getElementById('paper-canvas');
const inkCanvas = document.getElementById('ink-canvas');
const paperCtx = paperCanvas.getContext('2d');
const inkCtx = inkCanvas.getContext('2d');
const overlay = document.getElementById('result-overlay');
const hint = document.getElementById('hint');
const scoreEl = document.getElementById('score-value');
const gradeEl = document.getElementById('grade');
const newBestEl = document.getElementById('new-best');
const bestScoreEl = document.getElementById('best-score-value');
const retryBtn = document.getElementById('retry-btn');

let W, H, dpr;
let points = [];
let isDrawing = false;
let isDone = false;
let smoothV = 0;
let paperFibers = null;
let bestScore = 0;

// Bleed system
let bleedPoints = [];
let bleedFrame = null;

// Ink splatters (persistent dots generated during drawing)
let splatters = [];

// Bristle brush configuration
const BRISTLE_COUNT = 12;
let bristles = [];

function createBristles() {
  bristles = [];
  for (let i = 0; i < BRISTLE_COUNT; i++) {
    const t = i / (BRISTLE_COUNT - 1); // 0..1
    const distFromCenter = Math.abs(t - 0.5) * 2; // 0 at center, 1 at edge
    bristles.push({
      offset: (t - 0.5) * 2,                                  // -1..1
      jitter: (Math.random() - 0.5) * 0.12,                   // slight randomness
      opacity: 0.14 + (1 - distFromCenter) * 0.20 + Math.random() * 0.04,
      // Center bristles darker (~0.34), edge bristles lighter (~0.14)
      thickness: 0.5 + Math.random() * 0.8,
      seed: Math.floor(Math.random() * 10000)                 // for deterministic dry brush
    });
  }
}
createBristles();

try { bestScore = parseFloat(localStorage.getItem('perfectCircleBest')) || 0; } catch(e) {}
updateBest();

// ============================================================
// Audio
// ============================================================
let ac = null, noiseBuf = null, brushSrc = null, brushGain = null, brushFilt = null;

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  const sz = ac.sampleRate * 2;
  noiseBuf = ac.createBuffer(1, sz, ac.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
}

function startBrushSound() {
  if (!ac) return;
  brushSrc = ac.createBufferSource();
  brushSrc.buffer = noiseBuf; brushSrc.loop = true;
  brushFilt = ac.createBiquadFilter();
  brushFilt.type = 'bandpass'; brushFilt.frequency.value = 1200; brushFilt.Q.value = 0.8;
  brushGain = ac.createGain(); brushGain.gain.value = 0;
  brushSrc.connect(brushFilt); brushFilt.connect(brushGain); brushGain.connect(ac.destination);
  brushSrc.start();
}

function updateBrushSound(v) {
  if (!brushGain) return;
  const n = Math.min(v / 1.5, 1);
  brushGain.gain.setTargetAtTime(0.02 + n * 0.04, ac.currentTime, 0.05);
  brushFilt.frequency.setTargetAtTime(800 + n * 1200, ac.currentTime, 0.05);
}

function stopBrushSound() {
  if (brushGain) brushGain.gain.setTargetAtTime(0, ac.currentTime, 0.06);
  setTimeout(() => { try { brushSrc && brushSrc.stop(); } catch(e) {} brushSrc = null; }, 200);
}

// ============================================================
// Resize
// ============================================================
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  [paperCanvas, inkCanvas].forEach(c => {
    c.width = W * dpr; c.height = H * dpr;
    c.style.width = W + 'px'; c.style.height = H + 'px';
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  drawPaper();
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// Hanji Paper Background
// ============================================================
function drawPaper() {
  paperCtx.fillStyle = '#F2EBD9';
  paperCtx.fillRect(0, 0, W, H);

  if (!paperFibers || paperFibers._w !== W) {
    paperFibers = []; paperFibers._w = W;
    for (let i = 0; i < 500; i++) {
      paperFibers.push({
        x: Math.random() * W, y: Math.random() * H,
        a: (Math.random() < 0.7 ? 0 : Math.PI / 2) + (Math.random() - 0.5) * 0.4,
        l: 10 + Math.random() * 60, c: (Math.random() - 0.5) * 5,
        o: 0.02 + Math.random() * 0.055, w: 0.3 + Math.random() * 0.7
      });
    }
  }
  paperCtx.save();
  paperCtx.strokeStyle = '#D9CEAA'; paperCtx.lineCap = 'round';
  for (const f of paperFibers) {
    paperCtx.globalAlpha = f.o; paperCtx.lineWidth = f.w;
    paperCtx.beginPath(); paperCtx.moveTo(f.x, f.y);
    const ex = f.x + Math.cos(f.a) * f.l, ey = f.y + Math.sin(f.a) * f.l;
    paperCtx.quadraticCurveTo(
      (f.x + ex) / 2 - Math.sin(f.a) * f.c,
      (f.y + ey) / 2 + Math.cos(f.a) * f.c, ex, ey
    );
    paperCtx.stroke();
  }
  paperCtx.restore();
  // Grain noise
  paperCtx.save(); paperCtx.globalAlpha = 0.015;
  for (let i = 0; i < 3000; i++) {
    paperCtx.fillStyle = Math.random() > 0.5 ? '#C0B090' : '#FFF8E8';
    paperCtx.fillRect(Math.random() * W, Math.random() * H, 1, 1);
  }
  paperCtx.restore();
}

// ============================================================
// Brush Width — velocity-responsive (sumi-e: slow=thick, fast=thin)
// ============================================================
function getWidth(v) {
  return Math.max(2, 8 * (1 - Math.min(v / 2.0, 1) * 0.6));
}

// ============================================================
// Circle Completion — angle-based detection
//
// Circle is complete when:
// 1. The stroke's angular sweep >= 360° (passed start), OR
// 2. Coverage >= 85% AND the stroke segment crosses start area
// ============================================================
function getCoverage() {
  if (points.length < 10) return 0;
  let cx = 0, cy = 0;
  for (const p of points) { cx += p.x; cy += p.y; }
  cx /= points.length; cy /= points.length;

  let totalAngle = 0;
  for (let i = 1; i < points.length; i++) {
    const a0 = Math.atan2(points[i - 1].y - cy, points[i - 1].x - cx);
    const a1 = Math.atan2(points[i].y - cy, points[i].x - cx);
    let da = a1 - a0;
    if (da > Math.PI) da -= 2 * Math.PI;
    if (da < -Math.PI) da += 2 * Math.PI;
    totalAngle += da;
  }
  return Math.abs(totalAngle) / (2 * Math.PI);
}

// Does line segment (ax,ay)→(bx,by) pass within radius r of point (cx,cy)?
function segmentNearPoint(ax, ay, bx, by, cx, cy, r) {
  const dx = bx - ax, dy = by - ay;
  const fx = ax - cx, fy = ay - cy;
  const a = dx * dx + dy * dy;
  if (a < 0.001) return Math.hypot(fx, fy) < r;
  const b = 2 * (fx * dx + fy * dy);
  const c = fx * fx + fy * fy - r * r;
  let disc = b * b - 4 * a * c;
  if (disc < 0) return false;
  disc = Math.sqrt(disc);
  const t1 = (-b - disc) / (2 * a);
  const t2 = (-b + disc) / (2 * a);
  return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
}

function isCircleComplete(pos) {
  if (points.length < 20) return false;
  const coverage = getCoverage();

  // Passed start point: swept >= 360°
  if (coverage >= 1.0) return true;

  // Close to start with high coverage
  const start = points[0];
  const distToStart = Math.hypot(pos.x - start.x, pos.y - start.y);
  if (coverage >= 0.85 && distToStart < 18) return true;

  // Stroke segment crosses through start area
  if (coverage >= 0.75 && points.length > 2) {
    const prev = points[points.length - 2];
    if (segmentNearPoint(prev.x, prev.y, pos.x, pos.y, start.x, start.y, 12)) {
      return true;
    }
  }

  return false;
}

// ============================================================
// Ink Rendering — Bristle-based sumi-e brush
//
// 12 bristles simulate real brush hairs on paper.
// Each bristle is a thin semi-transparent line offset from center.
// Overlapping bristles naturally create:
//   - Dark center (농묵) from many overlaps
//   - Lighter edges (담묵) from fewer overlaps
//   - Visible brush texture from individual bristle paths
// At high velocity, outer bristles break = dry brush (비백/飛白)
// ============================================================

function renderInk() {
  inkCtx.clearRect(0, 0, W, H);
  if (points.length < 2) {
    if (points.length === 1) {
      const p = points[0], w = getWidth(0);
      inkCtx.save();
      inkCtx.fillStyle = 'rgba(26,18,9,0.55)';
      inkCtx.shadowColor = 'rgba(26,18,9,0.25)';
      inkCtx.shadowBlur = w * 3;
      inkCtx.beginPath(); inkCtx.arc(p.x, p.y, w * 0.8, 0, Math.PI * 2); inkCtx.fill();
      inkCtx.restore();
    }
    return;
  }

  // Precompute normals for each point
  const normals = [];
  for (let i = 0; i < points.length; i++) {
    let nx = 0, ny = 0;
    if (i < points.length - 1) {
      const dx = points[i + 1].x - points[i].x;
      const dy = points[i + 1].y - points[i].y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      nx = -dy / len; ny = dx / len;
    } else if (i > 0) {
      nx = normals[i - 1].x; ny = normals[i - 1].y;
    }
    normals.push({ x: nx, y: ny });
  }

  // --- Layer 1: Ink mist (안개) — wide faint halo ---
  inkCtx.save();
  inkCtx.strokeStyle = 'rgba(61,43,26,0.025)';
  inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round';
  inkCtx.shadowColor = 'rgba(61,43,26,0.04)';
  inkCtx.shadowBlur = 45;
  inkCtx.lineWidth = 36;
  drawSmoothPath(inkCtx, points);
  inkCtx.restore();

  // --- Layer 1b: Secondary bleed halo (번짐 확산) ---
  inkCtx.save();
  inkCtx.strokeStyle = 'rgba(50,38,22,0.04)';
  inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round';
  inkCtx.shadowColor = 'rgba(50,38,22,0.035)';
  inkCtx.shadowBlur = 22;
  inkCtx.lineWidth = 20;
  drawSmoothPath(inkCtx, points);
  inkCtx.restore();

  // --- Layer 2: Bristle brush (main ink body) ---
  inkCtx.save();
  inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round';

  for (const b of bristles) {
    const isOuter = Math.abs(b.offset) > 0.6;

    // Build bristle path points
    const bpts = [];
    for (let i = 0; i < points.length; i++) {
      const p = points[i];
      const n = normals[i];
      const w = getWidth(p.v);
      const off = (b.offset + b.jitter) * w;
      bpts.push({ x: p.x + n.x * off, y: p.y + n.y * off, v: p.v });
    }

    inkCtx.strokeStyle = `rgba(26,18,9,${b.opacity})`;
    inkCtx.lineWidth = b.thickness;
    inkCtx.shadowColor = 'rgba(26,18,9,0.03)';
    inkCtx.shadowBlur = 1.5;

    // Split path into segments for dry brush gaps (비백)
    // Outer bristles break at high velocity — deterministic based on seed
    let segments = [[]];
    for (let i = 0; i < bpts.length; i++) {
      const v = bpts[i].v;
      const dryThreshold = isOuter ? 0.6 : 1.2;
      // Deterministic gap pattern using seed + index
      const hash = ((i * 7 + b.seed) * 2654435761) >>> 0;
      const skipChance = Math.max(0, (v - dryThreshold) * 0.4);
      if (skipChance > 0 && (hash % 100) < skipChance * 100) {
        if (segments[segments.length - 1].length > 0) segments.push([]);
        continue;
      }
      segments[segments.length - 1].push(bpts[i]);
    }

    // Draw each segment as smooth quadratic path
    for (const seg of segments) {
      if (seg.length < 2) continue;
      inkCtx.beginPath();
      inkCtx.moveTo(seg[0].x, seg[0].y);
      for (let i = 1; i < seg.length - 1; i++) {
        const mid = { x: (seg[i].x + seg[i + 1].x) / 2, y: (seg[i].y + seg[i + 1].y) / 2 };
        inkCtx.quadraticCurveTo(seg[i].x, seg[i].y, mid.x, mid.y);
      }
      inkCtx.lineTo(seg[seg.length - 1].x, seg[seg.length - 1].y);
      inkCtx.stroke();
    }
  }
  inkCtx.shadowBlur = 0;
  inkCtx.restore();

  // --- Layer 3: Ink pooling at start point (먹 고임) ---
  const startP = points[0];
  const startW = getWidth(0);
  inkCtx.save();
  const poolGrad = inkCtx.createRadialGradient(
    startP.x, startP.y, 0, startP.x, startP.y, startW * 1.8
  );
  poolGrad.addColorStop(0, 'rgba(26,18,9,0.45)');
  poolGrad.addColorStop(0.5, 'rgba(26,18,9,0.2)');
  poolGrad.addColorStop(1, 'rgba(26,18,9,0)');
  inkCtx.fillStyle = poolGrad;
  inkCtx.beginPath(); inkCtx.arc(startP.x, startP.y, startW * 1.8, 0, Math.PI * 2); inkCtx.fill();
  inkCtx.restore();

  // --- Layer 4: Ink splatters (먹 튀김) ---
  if (splatters.length > 0) {
    inkCtx.save();
    for (const s of splatters) {
      inkCtx.fillStyle = `rgba(26,18,9,${s.o})`;
      inkCtx.beginPath();
      inkCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      inkCtx.fill();
    }
    inkCtx.restore();
  }

  // --- Bleed expansion ---
  renderBleed();

  // --- Start indicator (while drawing) ---
  if (isDrawing && points.length > 10) {
    drawStartIndicator();
  }
}

function drawSmoothPath(ctx, pts) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mid = { x: (pts[i].x + pts[i + 1].x) / 2, y: (pts[i].y + pts[i + 1].y) / 2 };
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mid.x, mid.y);
  }
  ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
  ctx.stroke();
}

// ============================================================
// Bleed Animation — ink slowly spreads into paper
// ============================================================
function addBleed(x, y, w) {
  // Main bleed — wide spread
  bleedPoints.push({
    x: x + (Math.random() - 0.5) * 3,
    y: y + (Math.random() - 0.5) * 3,
    currentR: w * 1.5,
    maxR: w * 4.0 + Math.random() * w * 3.0,
    opacity: 0.015 + Math.random() * 0.02,
    speed: 0.04 + Math.random() * 0.10,
    done: false
  });
  // Secondary micro-bleed — farther, fainter
  if (Math.random() < 0.4) {
    const angle = Math.random() * Math.PI * 2;
    const drift = w * 1.5 + Math.random() * w;
    bleedPoints.push({
      x: x + Math.cos(angle) * drift,
      y: y + Math.sin(angle) * drift,
      currentR: w * 0.5,
      maxR: w * 2.0 + Math.random() * w * 2.0,
      opacity: 0.01 + Math.random() * 0.015,
      speed: 0.03 + Math.random() * 0.08,
      done: false
    });
  }
}

function renderBleed() {
  inkCtx.save();
  inkCtx.globalCompositeOperation = 'darken';
  for (const b of bleedPoints) {
    if (!b.done) {
      b.currentR += b.speed;
      if (b.currentR >= b.maxR) { b.currentR = b.maxR; b.done = true; }
    }
    const grad = inkCtx.createRadialGradient(b.x, b.y, b.currentR * 0.3, b.x, b.y, b.currentR);
    grad.addColorStop(0, `rgba(61,43,26,${b.opacity})`);
    grad.addColorStop(0.4, `rgba(75,50,35,${b.opacity * 0.7})`);
    grad.addColorStop(0.7, `rgba(90,58,42,${b.opacity * 0.35})`);
    grad.addColorStop(1, 'rgba(90,58,42,0)');
    inkCtx.fillStyle = grad;
    inkCtx.beginPath();
    inkCtx.arc(b.x, b.y, b.currentR, 0, Math.PI * 2);
    inkCtx.fill();
  }
  inkCtx.restore();
}

function bleedLoop() {
  if (bleedPoints.some(b => !b.done)) {
    renderInk();
    bleedFrame = requestAnimationFrame(bleedLoop);
  } else {
    bleedFrame = null;
    renderInk();
  }
}

function startBleed() {
  if (!bleedFrame) bleedFrame = requestAnimationFrame(bleedLoop);
}

// ============================================================
// Start point indicator
// ============================================================
function drawStartIndicator() {
  const start = points[0];
  const last = points[points.length - 1];
  const dist = Math.hypot(last.x - start.x, last.y - start.y);
  const coverage = getCoverage();
  const nearClose = coverage > 0.65 && dist < 60;

  const t = Date.now() * 0.004;
  const pulse = nearClose ? 0.30 + Math.sin(t) * 0.15 : 0.08 + Math.sin(t) * 0.04;
  const radius = nearClose ? 15 + Math.sin(t) * 2 : 11;

  inkCtx.save();
  inkCtx.strokeStyle = `rgba(26,18,9,${pulse})`;
  inkCtx.lineWidth = nearClose ? 1.5 : 0.8;
  inkCtx.setLineDash(nearClose ? [] : [3, 3]);
  inkCtx.beginPath();
  inkCtx.arc(start.x, start.y, radius, 0, Math.PI * 2);
  inkCtx.stroke();
  inkCtx.setLineDash([]);
  inkCtx.restore();
}

// ============================================================
// Scoring
// ============================================================
function computeStats(pts) {
  if (pts.length < 3) return { cx: 0, cy: 0, r: 0, deviations: [] };
  let cx = 0, cy = 0;
  for (const p of pts) { cx += p.x; cy += p.y; }
  cx /= pts.length; cy /= pts.length;
  let r = 0;
  for (const p of pts) r += Math.hypot(p.x - cx, p.y - cy);
  r /= pts.length;
  const deviations = pts.map(p => Math.abs(Math.hypot(p.x - cx, p.y - cy) - r) / (r || 1));
  return { cx, cy, r, deviations };
}

function computeScore(pts) {
  if (pts.length < 10) return 0;
  const { cx, cy, r, deviations } = computeStats(pts);
  const avgDev = deviations.reduce((a, b) => a + b, 0) / deviations.length;
  const start = pts[0], end = pts[pts.length - 1];
  const closureGap = Math.hypot(end.x - start.x, end.y - start.y);
  const closurePenalty = Math.min(closureGap / (r || 1) * 15, 20);
  const angles = pts.map(p => Math.atan2(p.y - cy, p.x - cx));
  let totalAngle = 0;
  for (let i = 1; i < angles.length; i++) {
    let d = angles[i] - angles[i - 1];
    if (d > Math.PI) d -= 2 * Math.PI;
    if (d < -Math.PI) d += 2 * Math.PI;
    totalAngle += d;
  }
  const coverage = Math.abs(totalAngle) / (2 * Math.PI);
  const coveragePenalty = Math.max(0, (1 - coverage) * 40);
  return Math.max(0, Math.min(100, 100 - avgDev * 200 - closurePenalty - coveragePenalty));
}

function getGrade(s) {
  if (s >= 95) return { letter: 'S', color: '#C9922B' };
  if (s >= 85) return { letter: 'A', color: '#8B1A1A' };
  if (s >= 70) return { letter: 'B', color: '#3D2B1A' };
  if (s >= 50) return { letter: 'C', color: '#7A5C3F' };
  return { letter: 'D', color: '#A89070' };
}

// ============================================================
// Input
// ============================================================
function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onStart(e) {
  if (isDone) return;
  e.preventDefault();
  initAudio();
  if (ac && ac.state === 'suspended') ac.resume();
  const pos = getPos(e);
  smoothV = 0;
  points = [{ x: pos.x, y: pos.y, t: performance.now(), v: 0 }];
  bleedPoints = [];
  splatters = [];
  isDrawing = true;
  createBristles(); // Fresh bristle config each stroke
  hint.style.opacity = '0';
  startBrushSound();
  addBleed(pos.x, pos.y, getWidth(0));
  renderInk();
}

function onMove(e) {
  if (!isDrawing || isDone) return;
  e.preventDefault();
  const pos = getPos(e);
  const last = points[points.length - 1];
  const dist = Math.hypot(pos.x - last.x, pos.y - last.y);
  if (dist < 2.5) return;

  const now = performance.now();
  const dt = now - last.t;
  const rawV = dist / Math.max(dt, 1);
  smoothV = smoothV * 0.7 + rawV * 0.3;

  points.push({ x: pos.x, y: pos.y, t: now, v: smoothV });
  updateBrushSound(smoothV);
  addBleed(pos.x, pos.y, getWidth(smoothV));

  // Generate ink splatters at velocity spikes
  if (smoothV > 0.6 && Math.random() < smoothV * 0.3) {
    const angle = Math.random() * Math.PI * 2;
    const spDist = getWidth(smoothV) + 3 + Math.random() * 12;
    splatters.push({
      x: pos.x + Math.cos(angle) * spDist,
      y: pos.y + Math.sin(angle) * spDist,
      r: 0.3 + Math.random() * 1.5,
      o: 0.05 + Math.random() * 0.15
    });
  }

  // Circle completion check
  if (isCircleComplete(pos)) {
    finishCircle();
    return;
  }

  renderInk();
  startBleed();
}

function onEnd(e) {
  if (!isDrawing || isDone) return;
  if (e.type === 'pointerleave') return;
  e.preventDefault();
  isDrawing = false;
  stopBrushSound();

  // Final check: is circle complete?
  if (points.length > 20) {
    const end = points[points.length - 1];
    if (isCircleComplete(end)) {
      finishCircle();
      return;
    }
  }

  // Not complete — leave ink, reset after delay
  renderInk();
  setTimeout(() => {
    if (!isDone && !isDrawing) {
      points = [];
      bleedPoints = [];
      splatters = [];
      inkCtx.clearRect(0, 0, W, H);
      hint.style.opacity = '1';
    }
  }, 1500);
}

function finishCircle() {
  isDrawing = false;
  isDone = true;
  stopBrushSound();
  renderInk();
  const score = computeScore(points);
  setTimeout(() => showResult(score), 600);
}

// ============================================================
// Result
// ============================================================
function showResult(score) {
  const grade = getGrade(score);
  gradeEl.textContent = grade.letter;
  gradeEl.style.color = grade.color;
  overlay.classList.add('show');
  let cur = 0;
  const target = Math.round(score * 10) / 10;
  const step = target / 60;
  (function countUp() {
    cur += step;
    if (cur >= target) { scoreEl.textContent = target.toFixed(1); }
    else { scoreEl.textContent = cur.toFixed(1); requestAnimationFrame(countUp); }
  })();
  if (score > bestScore) {
    bestScore = score;
    try { localStorage.setItem('perfectCircleBest', bestScore.toString()); } catch(e) {}
    newBestEl.classList.add('show');
    updateBest();
  } else { newBestEl.classList.remove('show'); }
}

function updateBest() {
  bestScoreEl.textContent = bestScore > 0 ? bestScore.toFixed(1) + '%' : '—';
}

// ============================================================
// Reset
// ============================================================
function reset() {
  points = []; bleedPoints = []; splatters = [];
  isDrawing = false; isDone = false;
  if (bleedFrame) { cancelAnimationFrame(bleedFrame); bleedFrame = null; }
  overlay.classList.remove('show');
  scoreEl.textContent = '0';
  hint.style.opacity = '1';
  inkCtx.clearRect(0, 0, W, H);
}

// ============================================================
// Events
// ============================================================
inkCanvas.addEventListener('pointerdown', onStart);
inkCanvas.addEventListener('pointermove', onMove);
inkCanvas.addEventListener('pointerup', onEnd);
inkCanvas.addEventListener('pointerleave', onEnd);
inkCanvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
retryBtn.addEventListener('click', reset);
document.addEventListener('keydown', e => {
  if ((e.key === ' ' || e.key === 'Enter' || e.key === 'r' || e.key === 'R') && isDone) reset();
});
</script>
</body>
</html>
