<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Circle Void — 원을 그려 구멍을 열어라</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap">
<style>
  :root {
    --cv-bg: #F2EBD9;
    --cv-ink: #1A1209;
    --cv-ink-mid: #3D2B1A;
    --cv-ink-light: #7A5C3F;
    --cv-grade-s: #C9922B;
    --cv-grade-a: #8B1A1A;
    --cv-grade-b: #3D2B1A;
    --cv-grade-c: #7A5C3F;
    --cv-grade-d: #A89070;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--cv-bg);
    overflow: hidden;
    font-family: 'Noto Serif KR', serif;
    color: var(--cv-ink);
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    display: block; position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
  }
  #paper-canvas { z-index: 0; pointer-events: none; }
  #ink-canvas { z-index: 1; }

  #ui-layer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 10;
  }
  .top-bar { display: flex; justify-content: space-between; padding: 20px 30px; }
  .best-score {
    display: flex; align-items: center; gap: 8px;
    background: rgba(26,18,9,0.05); border: 1px solid rgba(26,18,9,0.10);
    border-radius: 12px; padding: 8px 16px; font-size: 13px; color: var(--cv-ink-mid);
  }
  .best-score span { font-weight: 700; color: var(--cv-ink); }
  .hint {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 18px; color: rgba(26,18,9,0.25); letter-spacing: 0.08em;
    transition: opacity 0.5s; pointer-events: none;
  }
  #result-overlay {
    position: fixed; top:0; left:0; width:100%; height:100%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 20;
  }
  #result-overlay.show { opacity: 1; pointer-events: auto; }
  .result-card {
    background: rgba(242,235,217,0.95); backdrop-filter: blur(16px);
    border: 1px solid rgba(26,18,9,0.10); border-radius: 20px;
    padding: 40px 48px; text-align: center;
    box-shadow: 0 8px 32px rgba(26,18,9,0.08);
  }
  .grade { font-size: 72px; font-weight: 700; line-height: 1; margin-bottom: 8px; }
  .score-label { font-size: 13px; color: var(--cv-ink-light); margin-bottom: 4px; letter-spacing: 0.1em; }
  .score-value { font-size: 32px; font-weight: 700; margin-bottom: 20px; }
  .new-best { display: none; font-size: 13px; color: var(--cv-grade-s); margin-bottom: 16px; }
  .new-best.show { display: block; }
  .retry-btn {
    background: var(--cv-ink); color: var(--cv-bg); border: none;
    border-radius: 10px; padding: 12px 36px; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer; pointer-events: auto;
  }
  .retry-btn:hover { opacity: 0.8; }
</style>
</head>
<body>

<canvas id="paper-canvas"></canvas>
<canvas id="ink-canvas"></canvas>

<div id="ui-layer">
  <div class="top-bar">
    <div class="best-score">최고 <span id="best-score-value">—</span></div>
  </div>
  <div class="hint" id="hint">붓을 들어 원을 그리세요</div>
</div>

<div id="result-overlay">
  <div class="result-card">
    <div class="grade" id="grade">S</div>
    <div class="score-label">정확도</div>
    <div class="score-value"><span id="score-value">0</span>%</div>
    <div class="new-best" id="new-best">새로운 기록!</div>
    <button class="retry-btn" id="retry-btn">다시 그리기</button>
  </div>
</div>

<script>
// ============================================================
// Setup
// ============================================================
const paperCanvas = document.getElementById('paper-canvas');
const inkCanvas = document.getElementById('ink-canvas');
const paperCtx = paperCanvas.getContext('2d');
const inkCtx = inkCanvas.getContext('2d');
const overlay = document.getElementById('result-overlay');
const hint = document.getElementById('hint');
const scoreEl = document.getElementById('score-value');
const gradeEl = document.getElementById('grade');
const newBestEl = document.getElementById('new-best');
const bestScoreEl = document.getElementById('best-score-value');
const retryBtn = document.getElementById('retry-btn');

let W, H, dpr;
let points = [];
let isDrawing = false;
let isDone = false;
let smoothV = 0;
let paperFibers = null;
let bestScore = 0;

// Bleed system
let bleedPoints = []; // points waiting to bleed
let bleedFrame = null;

// Close detection
const CLOSE_DIST = 35; // px — how close end must be to start

try { bestScore = parseFloat(localStorage.getItem('perfectCircleBest')) || 0; } catch(e) {}
updateBest();

// ============================================================
// Audio
// ============================================================
let ac = null, noiseBuf = null, brushSrc = null, brushGain = null, brushFilt = null;

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  const sz = ac.sampleRate * 2;
  noiseBuf = ac.createBuffer(1, sz, ac.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
}

function startBrushSound() {
  if (!ac) return;
  brushSrc = ac.createBufferSource();
  brushSrc.buffer = noiseBuf; brushSrc.loop = true;
  brushFilt = ac.createBiquadFilter();
  brushFilt.type = 'bandpass'; brushFilt.frequency.value = 1200; brushFilt.Q.value = 0.8;
  brushGain = ac.createGain(); brushGain.gain.value = 0;
  brushSrc.connect(brushFilt); brushFilt.connect(brushGain); brushGain.connect(ac.destination);
  brushSrc.start();
}

function updateBrushSound(v) {
  if (!brushGain) return;
  const n = Math.min(v / 1.5, 1);
  brushGain.gain.setTargetAtTime(0.02 + n * 0.04, ac.currentTime, 0.05);
  brushFilt.frequency.setTargetAtTime(800 + n * 1200, ac.currentTime, 0.05);
}

function stopBrushSound() {
  if (brushGain) brushGain.gain.setTargetAtTime(0, ac.currentTime, 0.06);
  setTimeout(() => { try { brushSrc && brushSrc.stop(); } catch(e) {} brushSrc = null; }, 200);
}

// ============================================================
// Resize
// ============================================================
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  [paperCanvas, inkCanvas].forEach(c => {
    c.width = W * dpr; c.height = H * dpr;
    c.style.width = W + 'px'; c.style.height = H + 'px';
    c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
  });
  drawPaper();
}
window.addEventListener('resize', resize);
resize();

// ============================================================
// Hanji Paper
// ============================================================
function drawPaper() {
  paperCtx.fillStyle = '#F2EBD9';
  paperCtx.fillRect(0, 0, W, H);

  if (!paperFibers || paperFibers._w !== W) {
    paperFibers = []; paperFibers._w = W;
    for (let i = 0; i < 400; i++) {
      paperFibers.push({
        x: Math.random() * W, y: Math.random() * H,
        a: (Math.random() < 0.7 ? 0 : Math.PI/2) + (Math.random()-0.5)*0.4,
        l: 12 + Math.random()*50, c: (Math.random()-0.5)*4,
        o: 0.025 + Math.random()*0.06, w: 0.3 + Math.random()*0.6
      });
    }
  }
  paperCtx.save();
  paperCtx.strokeStyle = '#D9CEAA'; paperCtx.lineCap = 'round';
  for (const f of paperFibers) {
    paperCtx.globalAlpha = f.o; paperCtx.lineWidth = f.w;
    paperCtx.beginPath(); paperCtx.moveTo(f.x, f.y);
    const ex = f.x + Math.cos(f.a)*f.l, ey = f.y + Math.sin(f.a)*f.l;
    paperCtx.quadraticCurveTo((f.x+ex)/2 - Math.sin(f.a)*f.c, (f.y+ey)/2 + Math.cos(f.a)*f.c, ex, ey);
    paperCtx.stroke();
  }
  paperCtx.restore();
  // grain
  paperCtx.save(); paperCtx.globalAlpha = 0.012;
  for (let i = 0; i < 2000; i++) {
    paperCtx.fillStyle = Math.random() > 0.5 ? '#C0B090' : '#FFF8E8';
    paperCtx.fillRect(Math.random()*W, Math.random()*H, 1, 1);
  }
  paperCtx.restore();
}

// ============================================================
// Ink Brush — Multi-layer sumi ink rendering
//
// Real 수묵 ink on 화선지 has 3 visible layers:
// 1. Mist (안개): very faint, wide spread beyond stroke
// 2. Bleed (번짐): medium spread, the "cotton-like" diffusion
// 3. Core (농묵): dark center where brush pressed
//
// We render all 3 using shadowBlur + quadratic curves
// ============================================================

function getRadius(v) {
  // Slow = thick, fast = thin
  return Math.max(1.5, 6 * (1 - Math.min(v / 1.8, 1) * 0.55));
}

function renderInk() {
  inkCtx.clearRect(0, 0, W, H);
  if (points.length < 2) {
    if (points.length === 1) {
      // Single dot
      const p = points[0], r = getRadius(0);
      inkCtx.save();
      inkCtx.fillStyle = 'rgba(26,18,9,0.7)';
      inkCtx.shadowColor = 'rgba(26,18,9,0.3)';
      inkCtx.shadowBlur = r * 3;
      inkCtx.beginPath(); inkCtx.arc(p.x, p.y, r, 0, Math.PI*2); inkCtx.fill();
      inkCtx.restore();
    }
    return;
  }

  // Build smooth path via quadratic bezier midpoints
  const smoothPath = [];
  smoothPath.push({ x: points[0].x, y: points[0].y, v: points[0].v });
  for (let i = 1; i < points.length - 1; i++) {
    const p = points[i], n = points[i+1];
    smoothPath.push({ x: p.x, y: p.y, v: p.v });
    // midpoint
    smoothPath.push({ x: (p.x+n.x)/2, y: (p.y+n.y)/2, v: (p.v+n.v)/2 });
  }
  smoothPath.push(points[points.length-1]);

  // --- Layer 1: Mist (안개 확산) ---
  // Very wide, very faint — simulates ink vapor spreading into fibers
  inkCtx.save();
  inkCtx.strokeStyle = 'rgba(61,43,26,0.06)';
  inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round';
  inkCtx.shadowColor = 'rgba(61,43,26,0.08)';
  inkCtx.shadowBlur = 25;
  inkCtx.lineWidth = 18;
  drawSmoothPath(inkCtx, points);
  inkCtx.restore();

  // --- Layer 2: Bleed (번짐) ---
  // Medium width, medium opacity — the cotton-like diffusion
  inkCtx.save();
  inkCtx.strokeStyle = 'rgba(38,28,16,0.15)';
  inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round';
  inkCtx.shadowColor = 'rgba(26,18,9,0.12)';
  inkCtx.shadowBlur = 12;
  inkCtx.lineWidth = 10;
  drawSmoothPath(inkCtx, points);
  inkCtx.restore();

  // --- Layer 3: Core ink (농묵) ---
  // Variable width, dark — where the brush touched
  inkCtx.save();
  inkCtx.lineCap = 'round'; inkCtx.lineJoin = 'round';
  for (let i = 1; i < points.length; i++) {
    const p0 = points[i-1], p1 = points[i];
    const r = getRadius(p1.v);
    inkCtx.strokeStyle = `rgba(26,18,9,${0.75 + Math.random()*0.15})`;
    inkCtx.lineWidth = r * 1.6;
    inkCtx.shadowColor = 'rgba(26,18,9,0.2)';
    inkCtx.shadowBlur = 3;
    inkCtx.beginPath();
    inkCtx.moveTo(p0.x, p0.y);
    // Quadratic curve to midpoint for smoothness
    if (i < points.length - 1) {
      const mid = { x: (p1.x + points[i+1].x)/2, y: (p1.y + points[i+1].y)/2 };
      inkCtx.quadraticCurveTo(p1.x, p1.y, mid.x, mid.y);
    } else {
      inkCtx.lineTo(p1.x, p1.y);
    }
    inkCtx.stroke();
  }
  inkCtx.shadowBlur = 0;
  inkCtx.restore();

  // --- Layer 4: Edge bleed dots (섬유 따라 번짐) ---
  // Tiny scattered dots along edges — ink following paper fibers
  inkCtx.save();
  inkCtx.fillStyle = 'rgba(61,43,26,0.08)';
  for (let i = 0; i < points.length; i += 2) {
    const p = points[i], r = getRadius(p.v);
    const count = 3 + Math.floor(Math.random() * 4);
    for (let j = 0; j < count; j++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = r + 2 + Math.random() * (r * 1.5);
      const size = 0.3 + Math.random() * 1.2;
      inkCtx.beginPath();
      inkCtx.arc(p.x + Math.cos(angle)*dist, p.y + Math.sin(angle)*dist, size, 0, Math.PI*2);
      inkCtx.fill();
    }
  }
  inkCtx.restore();

  // --- Bleed spread animation on separate pass ---
  // Expand existing bleed spots
  renderBleed();

  // --- Start point indicator (when drawing) ---
  if (isDrawing && points.length > 5) {
    drawStartIndicator();
  }
}

function drawSmoothPath(ctx, pts) {
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length - 1; i++) {
    const mid = { x: (pts[i].x + pts[i+1].x)/2, y: (pts[i].y + pts[i+1].y)/2 };
    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mid.x, mid.y);
  }
  ctx.lineTo(pts[pts.length-1].x, pts[pts.length-1].y);
  ctx.stroke();
}

// ============================================================
// Bleed Animation — ink slowly spreads into paper over time
// ============================================================
function addBleed(x, y, r) {
  bleedPoints.push({
    x: x + (Math.random()-0.5)*2,
    y: y + (Math.random()-0.5)*2,
    currentR: r * 1.2,
    maxR: r * 2.5 + Math.random() * r * 1.5,
    opacity: 0.03 + Math.random() * 0.03,
    speed: 0.08 + Math.random() * 0.15,
    done: false
  });
}

function renderBleed() {
  // Draw bleed spots on ink canvas (they persist because we clear+redraw each frame)
  inkCtx.save();
  inkCtx.globalCompositeOperation = 'darken';
  for (const b of bleedPoints) {
    if (!b.done) {
      b.currentR += b.speed;
      if (b.currentR >= b.maxR) { b.currentR = b.maxR; b.done = true; }
    }
    const grad = inkCtx.createRadialGradient(b.x, b.y, b.currentR*0.5, b.x, b.y, b.currentR);
    grad.addColorStop(0, `rgba(61,43,26,${b.opacity})`);
    grad.addColorStop(0.7, `rgba(90,58,42,${b.opacity * 0.6})`);
    grad.addColorStop(1, 'rgba(90,58,42,0)');
    inkCtx.fillStyle = grad;
    inkCtx.beginPath();
    inkCtx.arc(b.x, b.y, b.currentR, 0, Math.PI*2);
    inkCtx.fill();
  }
  inkCtx.restore();
}

function bleedLoop() {
  let active = bleedPoints.some(b => !b.done);
  if (active) {
    renderInk(); // re-render everything including updated bleeds
    bleedFrame = requestAnimationFrame(bleedLoop);
  } else {
    bleedFrame = null;
    renderInk(); // final render
  }
}

function startBleed() {
  if (!bleedFrame) bleedFrame = requestAnimationFrame(bleedLoop);
}

// ============================================================
// Start point indicator — shows where to close the circle
// ============================================================
function drawStartIndicator() {
  if (points.length < 10) return;
  const start = points[0];
  const last = points[points.length - 1];
  const dist = Math.hypot(last.x - start.x, last.y - start.y);
  const nearClose = dist < CLOSE_DIST * 2;

  // Pulsing ring at start point
  const t = Date.now() * 0.004;
  const pulse = nearClose ? 0.35 + Math.sin(t) * 0.15 : 0.12 + Math.sin(t) * 0.05;
  const radius = nearClose ? 18 + Math.sin(t) * 3 : 14;

  inkCtx.save();
  inkCtx.strokeStyle = `rgba(26,18,9,${pulse})`;
  inkCtx.lineWidth = nearClose ? 2 : 1;
  inkCtx.setLineDash(nearClose ? [] : [4, 4]);
  inkCtx.beginPath();
  inkCtx.arc(start.x, start.y, radius, 0, Math.PI * 2);
  inkCtx.stroke();
  inkCtx.setLineDash([]);
  inkCtx.restore();
}

// ============================================================
// Scoring
// ============================================================
function computeStats(pts) {
  if (pts.length < 3) return { cx:0, cy:0, r:0, deviations:[] };
  let cx=0, cy=0;
  for (const p of pts) { cx+=p.x; cy+=p.y; }
  cx/=pts.length; cy/=pts.length;
  let r=0;
  for (const p of pts) r += Math.hypot(p.x-cx, p.y-cy);
  r /= pts.length;
  const deviations = pts.map(p => Math.abs(Math.hypot(p.x-cx, p.y-cy) - r) / (r||1));
  return { cx, cy, r, deviations };
}

function computeScore(pts) {
  if (pts.length < 10) return 0;
  const { cx, cy, r, deviations } = computeStats(pts);
  const avgDev = deviations.reduce((a,b)=>a+b,0) / deviations.length;
  const start = pts[0], end = pts[pts.length-1];
  const closureGap = Math.hypot(end.x-start.x, end.y-start.y);
  const closurePenalty = Math.min(closureGap / (r||1) * 15, 20);
  const angles = pts.map(p => Math.atan2(p.y-cy, p.x-cx));
  let totalAngle = 0;
  for (let i=1; i<angles.length; i++) {
    let d = angles[i]-angles[i-1];
    if (d > Math.PI) d -= 2*Math.PI;
    if (d < -Math.PI) d += 2*Math.PI;
    totalAngle += d;
  }
  const coverage = Math.abs(totalAngle) / (2*Math.PI);
  const coveragePenalty = Math.max(0, (1-coverage)*40);
  return Math.max(0, Math.min(100, 100 - avgDev*200 - closurePenalty - coveragePenalty));
}

function getGrade(s) {
  if (s >= 95) return { letter:'S', color:'#C9922B' };
  if (s >= 85) return { letter:'A', color:'#8B1A1A' };
  if (s >= 70) return { letter:'B', color:'#3D2B1A' };
  if (s >= 50) return { letter:'C', color:'#7A5C3F' };
  return { letter:'D', color:'#A89070' };
}

// ============================================================
// Input
// ============================================================
function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onStart(e) {
  if (isDone) return;
  e.preventDefault();
  initAudio();
  if (ac && ac.state === 'suspended') ac.resume();
  const pos = getPos(e);
  smoothV = 0;
  points = [{ x: pos.x, y: pos.y, t: performance.now(), v: 0 }];
  bleedPoints = [];
  isDrawing = true;
  hint.style.opacity = '0';
  startBrushSound();
  addBleed(pos.x, pos.y, getRadius(0));
  renderInk();
}

function onMove(e) {
  if (!isDrawing || isDone) return;
  e.preventDefault();
  const pos = getPos(e);
  const last = points[points.length - 1];
  const dist = Math.hypot(pos.x - last.x, pos.y - last.y);
  if (dist < 2.5) return;

  const now = performance.now();
  const dt = now - last.t;
  const rawV = dist / Math.max(dt, 1);
  smoothV = smoothV * 0.7 + rawV * 0.3;

  points.push({ x: pos.x, y: pos.y, t: now, v: smoothV });
  updateBrushSound(smoothV);

  // Add bleed for this point
  addBleed(pos.x, pos.y, getRadius(smoothV));

  // Check if near start point (circle closing)
  if (points.length > 30) {
    const start = points[0];
    const closeDist = Math.hypot(pos.x - start.x, pos.y - start.y);
    if (closeDist < CLOSE_DIST && computeStats(points).r > 25) {
      // Circle closed! Finish.
      finishCircle();
      return;
    }
  }

  renderInk();
  startBleed();
}

function onEnd(e) {
  if (!isDrawing || isDone) return;
  if (e.type === 'pointerleave') return; // ignore leave
  e.preventDefault();
  isDrawing = false;
  stopBrushSound();

  // Check if circle was closed (end near start)
  if (points.length > 30) {
    const start = points[0], end = points[points.length - 1];
    const closeDist = Math.hypot(end.x - start.x, end.y - start.y);
    if (closeDist < CLOSE_DIST && computeStats(points).r > 25) {
      finishCircle();
      return;
    }
  }

  // Not closed — just leave the ink on paper, let user try again
  // Fade the start indicator
  renderInk();
  // Reset after a moment so they can draw again
  setTimeout(() => {
    if (!isDone && !isDrawing) {
      points = [];
      bleedPoints = [];
      inkCtx.clearRect(0, 0, W, H);
      hint.style.opacity = '1';
    }
  }, 1500);
}

function finishCircle() {
  isDrawing = false;
  isDone = true;
  stopBrushSound();

  // Final render without start indicator
  renderInk();

  // Let bleed finish, then show score
  const score = computeScore(points);
  setTimeout(() => showResult(score), 600);
}

// ============================================================
// Result
// ============================================================
function showResult(score) {
  const grade = getGrade(score);
  gradeEl.textContent = grade.letter;
  gradeEl.style.color = grade.color;
  overlay.classList.add('show');
  let cur = 0;
  const target = Math.round(score * 10) / 10;
  const step = target / 60;
  (function countUp() {
    cur += step;
    if (cur >= target) { scoreEl.textContent = target.toFixed(1); }
    else { scoreEl.textContent = cur.toFixed(1); requestAnimationFrame(countUp); }
  })();
  if (score > bestScore) {
    bestScore = score;
    try { localStorage.setItem('perfectCircleBest', bestScore.toString()); } catch(e) {}
    newBestEl.classList.add('show');
    updateBest();
  } else { newBestEl.classList.remove('show'); }
}

function updateBest() {
  bestScoreEl.textContent = bestScore > 0 ? bestScore.toFixed(1) + '%' : '—';
}

// ============================================================
// Reset
// ============================================================
function reset() {
  points = []; bleedPoints = [];
  isDrawing = false; isDone = false;
  if (bleedFrame) { cancelAnimationFrame(bleedFrame); bleedFrame = null; }
  overlay.classList.remove('show');
  scoreEl.textContent = '0';
  hint.style.opacity = '1';
  inkCtx.clearRect(0, 0, W, H);
}

// ============================================================
// Events
// ============================================================
inkCanvas.addEventListener('pointerdown', onStart);
inkCanvas.addEventListener('pointermove', onMove);
inkCanvas.addEventListener('pointerup', onEnd);
