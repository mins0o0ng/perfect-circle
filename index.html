<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Perfect Circle Challenge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
  }

  #ui-layer {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 30px;
  }

  .best-score {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .best-score .trophy { font-size: 18px; }
  .best-score .value { color: #ffd700; }

  .hint {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    font-weight: 300;
    color: rgba(255,255,255,0.35);
    letter-spacing: 1px;
    transition: opacity 0.5s;
  }

  /* Result overlay */
  #result-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 20;
    pointer-events: none;
  }

  #result-overlay.show {
    display: flex;
    pointer-events: auto;
  }

  .result-card {
    background: rgba(12, 12, 20, 0.92);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 28px;
    padding: 50px 60px;
    text-align: center;
    transform: scale(0.8);
    opacity: 0;
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }

  #result-overlay.show .result-card {
    transform: scale(1);
    opacity: 1;
  }

  .result-card .grade {
    font-size: 64px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
  }

  .result-card .score-display {
    font-size: 48px;
    font-weight: 300;
    margin-bottom: 6px;
  }

  .result-card .score-display .pct { font-weight: 800; }

  .result-card .label {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 30px;
  }

  .result-card .new-best {
    display: none;
    font-size: 13px;
    font-weight: 600;
    color: #ffd700;
    letter-spacing: 1px;
    margin-bottom: 20px;
    animation: pulse-glow 1.5s ease-in-out infinite;
  }

  .result-card .new-best.show { display: block; }

  .retry-btn {
    pointer-events: auto;
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    padding: 14px 40px;
    letter-spacing: 0.5px;
    transition: all 0.25s;
  }

  .retry-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.25);
    transform: translateY(-1px);
  }

  @keyframes pulse-glow {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui-layer">
  <div class="top-bar">
    <div class="best-score">
      <span class="trophy">&#127942;</span>
      <span>BEST</span>
      <span class="value" id="best-score-value">—</span>
    </div>
  </div>
  <div class="hint" id="hint">드래그하여 원을 그려보세요</div>
</div>

<div id="result-overlay">
  <div class="result-card">
    <div class="grade" id="grade"></div>
    <div class="score-display"><span class="pct" id="score-value">0</span>%</div>
    <div class="label">ACCURACY</div>
    <div class="new-best" id="new-best">&#9733; NEW BEST RECORD &#9733;</div>
    <button class="retry-btn" id="retry-btn">다시 도전</button>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
const overlay = document.getElementById('result-overlay');
const scoreValue = document.getElementById('score-value');
const gradeEl = document.getElementById('grade');
const newBestEl = document.getElementById('new-best');
const bestScoreValue = document.getElementById('best-score-value');
const retryBtn = document.getElementById('retry-btn');

let W, H;
let points = [];
let particles = [];
let ripples = [];
let isDrawing = false;
let isDone = false;
let animFrame;
let gridOffset = 0;

// --- State ---
let centroid = { x: 0, y: 0 };
let avgRadius = 0;
let bestScore = parseFloat(localStorage.getItem('perfectCircleBest')) || 0;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();

updateBestDisplay();

// --- Color helpers ---
function deviationColor(deviation) {
  // deviation 0 = perfect green, 1+ = red
  const t = Math.min(deviation / 0.35, 1);
  const r = Math.round(255 * t);
  const g = Math.round(255 * (1 - t * 0.8));
  const b = Math.round(40 * (1 - t));
  return `rgb(${r},${g},${b})`;
}

function deviationColorAlpha(deviation, alpha) {
  const t = Math.min(deviation / 0.35, 1);
  const r = Math.round(255 * t);
  const g = Math.round(255 * (1 - t * 0.8));
  const b = Math.round(40 * (1 - t));
  return `rgba(${r},${g},${b},${alpha})`;
}

// --- Compute circle stats ---
function computeStats(pts) {
  if (pts.length < 3) return { cx: 0, cy: 0, r: 0, deviations: [] };
  let cx = 0, cy = 0;
  for (const p of pts) { cx += p.x; cy += p.y; }
  cx /= pts.length;
  cy /= pts.length;
  let r = 0;
  for (const p of pts) {
    r += Math.hypot(p.x - cx, p.y - cy);
  }
  r /= pts.length;
  const deviations = pts.map(p => {
    const dist = Math.hypot(p.x - cx, p.y - cy);
    return Math.abs(dist - r) / (r || 1);
  });
  return { cx, cy, r, deviations };
}

function computeScore(pts) {
  if (pts.length < 10) return 0;
  const { deviations } = computeStats(pts);
  const avgDev = deviations.reduce((a, b) => a + b, 0) / deviations.length;
  // Also check if the path forms a complete loop
  const start = pts[0];
  const end = pts[pts.length - 1];
  const { r } = computeStats(pts);
  const closureGap = Math.hypot(end.x - start.x, end.y - start.y);
  const closurePenalty = Math.min(closureGap / (r || 1) * 15, 20);
  // Check angular coverage
  const { cx, cy } = computeStats(pts);
  const angles = pts.map(p => Math.atan2(p.y - cy, p.x - cx));
  let totalAngle = 0;
  for (let i = 1; i < angles.length; i++) {
    let diff = angles[i] - angles[i - 1];
    if (diff > Math.PI) diff -= 2 * Math.PI;
    if (diff < -Math.PI) diff += 2 * Math.PI;
    totalAngle += diff;
  }
  const coverage = Math.abs(totalAngle) / (2 * Math.PI);
  const coveragePenalty = Math.max(0, (1 - coverage) * 40);

  const raw = 100 - avgDev * 200 - closurePenalty - coveragePenalty;
  return Math.max(0, Math.min(100, raw));
}

function getGrade(score) {
  if (score >= 95) return { letter: 'S', color: '#ffd700' };
  if (score >= 85) return { letter: 'A', color: '#00e676' };
  if (score >= 70) return { letter: 'B', color: '#29b6f6' };
  if (score >= 50) return { letter: 'C', color: '#ff9800' };
  return { letter: 'D', color: '#f44336' };
}

// --- Particles ---
function spawnParticles(x, y, color) {
  for (let i = 0; i < 2; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.5 + Math.random() * 1.5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      size: 1.5 + Math.random() * 2.5,
      color
    });
  }
}

function spawnRipple(cx, cy, r) {
  ripples.push({ cx, cy, r: 0, targetR: r, life: 1, speed: 3 });
}

// --- Drawing ---
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  const spacing = 40;
  for (let x = 0; x < W; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawStartGuide() {
  if (points.length === 0 || isDone) return;
  const start = points[0];
  const t = Date.now() * 0.003;
  const pulse = 0.3 + Math.sin(t) * 0.15;
  ctx.save();
  ctx.beginPath();
  ctx.arc(start.x, start.y, 18 + Math.sin(t) * 4, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,255,255,${pulse})`;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();
}

function drawPath() {
  if (points.length < 2) return;
  const stats = computeStats(points);

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  for (let i = 1; i < points.length; i++) {
    const dev = stats.deviations[i];
    const color = deviationColor(dev);

    // Glow layer
    ctx.beginPath();
    ctx.moveTo(points[i - 1].x, points[i - 1].y);
    ctx.lineTo(points[i].x, points[i].y);
    ctx.strokeStyle = deviationColorAlpha(dev, 0.3);
    ctx.lineWidth = 12;
    ctx.shadowColor = color;
    ctx.shadowBlur = 20;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Core line
    ctx.beginPath();
    ctx.moveTo(points[i - 1].x, points[i - 1].y);
    ctx.lineTo(points[i].x, points[i].y);
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawIdealCircle(stats, alpha) {
  if (!stats || stats.r < 10) return;
  ctx.save();
  ctx.beginPath();
  ctx.arc(stats.cx, stats.cy, stats.r, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.25})`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 8]);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawParticles() {
  ctx.save();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = p.color.replace('rgb', 'rgba').replace(')', `,${p.life * 0.7})`);
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawRipples() {
  ctx.save();
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += r.speed;
    r.life -= 0.012;
    if (r.life <= 0) { ripples.splice(i, 1); continue; }
    ctx.beginPath();
    ctx.arc(r.cx, r.cy, r.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,255,255,${r.life * 0.2})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }
  ctx.restore();
}

let idealAlpha = 0;
let showIdeal = false;
let finalStats = null;

function render() {
  ctx.clearRect(0, 0, W, H);

  // Background
  const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#111118');
  bg.addColorStop(1, '#08080c');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawGrid();

  if (showIdeal && finalStats) {
    idealAlpha = Math.min(idealAlpha + 0.02, 1);
    drawIdealCircle(finalStats, idealAlpha);
  }

  drawPath();
  drawStartGuide();
  drawParticles();
  drawRipples();

  animFrame = requestAnimationFrame(render);
}

render();

// --- Input ---
function getPos(e) {
  if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onStart(e) {
  if (isDone) return;
  e.preventDefault();
  const pos = getPos(e);
  points = [pos];
  isDrawing = true;
  hint.style.opacity = '0';
}

function onMove(e) {
  if (!isDrawing || isDone) return;
  e.preventDefault();
  const pos = getPos(e);
  const last = points[points.length - 1];

  // Only add if moved enough
  const dist = Math.hypot(pos.x - last.x, pos.y - last.y);
  if (dist < 3) return;

  points.push(pos);

  // Spawn particles
  const stats = computeStats(points);
  const dev = stats.deviations[stats.deviations.length - 1] || 0;
  const color = deviationColor(dev);
  spawnParticles(pos.x, pos.y, color);

  // Check if returned to start
  if (points.length > 30) {
    const start = points[0];
    const closeDist = Math.hypot(pos.x - start.x, pos.y - start.y);
    if (closeDist < 30 && stats.r > 30) {
      finishDrawing();
    }
  }
}

function onEnd(e) {
  if (!isDrawing || isDone) return;
  e.preventDefault();
  if (points.length > 20) {
    finishDrawing();
  } else {
    points = [];
    isDrawing = false;
    hint.style.opacity = '1';
  }
}

function finishDrawing() {
  isDrawing = false;
  isDone = true;
  finalStats = computeStats(points);
  showIdeal = true;

  // Ripple effect
  spawnRipple(finalStats.cx, finalStats.cy, finalStats.r);
  setTimeout(() => spawnRipple(finalStats.cx, finalStats.cy, finalStats.r * 0.6), 200);
  setTimeout(() => spawnRipple(finalStats.cx, finalStats.cy, finalStats.r * 1.3), 400);

  // Burst particles
  for (let i = 0; i < 50; i++) {
    const angle = (i / 50) * Math.PI * 2;
    const px = finalStats.cx + Math.cos(angle) * finalStats.r;
    const py = finalStats.cy + Math.sin(angle) * finalStats.r;
    spawnParticles(px, py, 'rgb(255,255,255)');
  }

  const score = computeScore(points);

  setTimeout(() => showResult(score), 600);
}

function showResult(score) {
  const grade = getGrade(score);
  gradeEl.textContent = grade.letter;
  gradeEl.style.color = grade.color;

  overlay.classList.add('show');

  // Count-up animation
  let current = 0;
  const target = Math.round(score * 10) / 10;
  const step = target / 60;
  function countUp() {
    current += step;
    if (current >= target) {
      current = target;
      scoreValue.textContent = target.toFixed(1);
    } else {
      scoreValue.textContent = current.toFixed(1);
      requestAnimationFrame(countUp);
    }
  }
  countUp();

  // Check best
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('perfectCircleBest', bestScore.toString());
    newBestEl.classList.add('show');
    updateBestDisplay();
  } else {
    newBestEl.classList.remove('show');
  }
}

function updateBestDisplay() {
  bestScoreValue.textContent = bestScore > 0 ? bestScore.toFixed(1) + '%' : '—';
}

function reset() {
  points = [];
  particles = [];
  ripples = [];
  isDrawing = false;
  isDone = false;
  showIdeal = false;
  idealAlpha = 0;
  finalStats = null;
  overlay.classList.remove('show');
  scoreValue.textContent = '0';
  hint.style.opacity = '1';
}

// Events
canvas.addEventListener('mousedown', onStart);
canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('mouseup', onEnd);
canvas.addEventListener('mouseleave', onEnd);
canvas.addEventListener('touchstart', onStart, { passive: false });
canvas.addEventListener('touchmove', onMove, { passive: false });
canvas.addEventListener('touchend', onEnd, { passive: false });
retryBtn.addEventListener('click', reset);

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'Enter') {
    if (isDone) reset();
  }
});
</script>
</body>
</html>
